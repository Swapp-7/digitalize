<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digitalize</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <aside class="library-panel" id="library-panel"></aside>
    <main class="workspace">
      <div class="toolbar" id="toolbar"></div>
      <div class="canvas-scroll-area" id="canvas-scroll-area">
        <div class="canvas-wrapper" id="canvas-wrapper">
          <canvas id="main-canvas"></canvas>
        </div>
      </div>
    </main>
    <aside class="properties-panel" id="properties-panel"></aside>
  </div>
  <input type="file" id="file-input" accept="image/*" multiple hidden />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="filters.js"></script>
  <script src="layers.js"></script>
  <script src="store.js"></script>
  <script src="fabric-bridge.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>
</body>
</html>
